apiVersion: apps/v1
kind: Deployment
metadata:
  name: rpg-api
  namespace: rpg-pipeline
  labels:
    app: rpg-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rpg-api
  template:
    metadata:
      labels:
        app: rpg-api
    spec:
      containers:
        - name: rpg-api
          image: rpg-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: rpg-api-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
