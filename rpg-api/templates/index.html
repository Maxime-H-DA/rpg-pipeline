<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bestiaire RPG</title>
</head>
<body>

    <h1>Bestiaire RPG Alterdune</h1>

    <div id="message"></div>

    <div id="section-login">
        <h2>Connexion Admin</h2>
        <input type="text" id="username" placeholder="Identifiant" />
        <input type="password" id="password" placeholder="Mot de passe" />
        <button onclick="login()">Se connecter</button>
    </div>

    <div id="section-admin" style="display:none">
        <h2>Ajouter un monstre</h2>

        <select id="categorie" onchange="mettreAJourActions()">
            <option value="">-- Categorie --</option>
            <option value="NORMAL">NORMAL</option>
            <option value="MINIBOSS">MINIBOSS</option>
            <option value="BOSS">BOSS</option>
        </select>

        <input type="text" id="nom" placeholder="Nom" />
        <input type="text" id="hp" placeholder="HP" />
        <input type="text" id="atk" placeholder="ATK" />
        <input type="text" id="def" placeholder="DEF" />
        <input type="text" id="mercy" placeholder="Mercy" />

        <div id="section-actions" style="display:none">
            <h3>Actions ACT</h3>
            <div id="selects-actions"></div>
        </div>

        <button onclick="ajouterMonstre()">Ajouter</button>
        <button onclick="deconnexion()">Se deconnecter</button>
    </div>

    <h2>Liste des monstres</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Nom</th>
                <th>Categorie</th>
                <th>HP</th>
                <th>ATK</th>
                <th>DEF</th>
                <th>Mercy</th>
                <th>Actions ACT</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="liste-monstres"></tbody>
    </table>

    <script src="/static/app.js"></script>

</body>
</html>
