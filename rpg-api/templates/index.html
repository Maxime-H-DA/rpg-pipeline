<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bestiaire RPG</title>
</head>
<body>

    <h1>Bestiaire RPG Alterdune</h1>

    <div id="message"></div>

    <div id="section-login">
        <h2>Connexion Admin</h2>
        <input type="text" id="username" placeholder="Identifiant" />
        <input type="password" id="password" placeholder="Mot de passe" />
        <button onclick="login()">Se connecter</button>
    </div>

    <div id="section-admin" style="display:none">
        <h2>Ajouter un monstre</h2>

        <select id="categorie" onchange="mettreAJourActions()">
            <option value="">-- Categorie --</option>
            <option value="NORMAL">NORMAL</option>
            <option value="MINIBOSS">MINIBOSS</option>
            <option value="BOSS">BOSS</option>
        </select>

        <input type="text" id="nom" placeholder="Nom" />
        <input type="text" id="hp" placeholder="HP" />
        <input type="text" id="atk" placeholder="ATK" />
        <input type="text" id="def" placeholder="DEF" />
        <input type="text" id="mercy" placeholder="Mercy" />

        <div id="section-actions" style="display:none">
            <h3>Actions ACT</h3>
            <div id="selects-actions"></div>
        </div>

        <button onclick="ajouterMonstre()">Ajouter</button>
        <button onclick="deconnexion()">Se deconnecter</button>
    </div>

    <h2>Liste des monstres</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Nom</th>
                <th>Categorie</th>
                <th>HP</th>
                <th>ATK</th>
                <th>DEF</th>
                <th>Mercy</th>
                <th>Actions ACT</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="liste-monstres"></tbody>
    </table>

    <script>
        let token = null;

        const actionsDisponibles = 
        [
            "JOKE", "COMPLIMENT", "DANCE", "PET",
            "DISCUSS", "OBSERVE", "INSULT", "THREATEN"
        ];

        const actionsParCategorie = 
        {
            "NORMAL": 2,
            "MINIBOSS": 3,
            "BOSS": 4
        };

        function afficherMessage(texte) 
        {
            document.getElementById("message").textContent = texte;
            setTimeout(() => document.getElementById("message").textContent = "", 3000);
        }

        function mettreAJourActions() 
        {
            const categorie = document.getElementById("categorie").value;
            const section = document.getElementById("section-actions");
            const container = document.getElementById("selects-actions");

            if (!categorie) 
            {
                section.style.display = "none";
                return;
            }

            section.style.display = "block";
            container.innerHTML = "";

            const nb = actionsParCategorie[categorie];

            for (let i = 1; i <= nb; i++) 
            {
                const select = document.createElement("select");
                select.id = "act" + i;

                const optionVide = document.createElement("option");
                optionVide.value = "";
                optionVide.textContent = "-- Action " + i + " --";
                select.appendChild(optionVide);

                for (const action of actionsDisponibles) 
                {
                    const option = document.createElement("option");
                    option.value = action;
                    option.textContent = action;
                    select.appendChild(option);
                }

                container.appendChild(select);
                container.appendChild(document.createTextNode(" "));
            }

            if (categorie === "NORMAL") 
            {
                const hidden3 = document.createElement("input");
                hidden3.type = "hidden";
                hidden3.id = "act3";
                hidden3.value = "-";
                container.appendChild(hidden3);

                const hidden4 = document.createElement("input");
                hidden4.type = "hidden";
                hidden4.id = "act4";
                hidden4.value = "-";
                container.appendChild(hidden4);
            }

            if (categorie === "MINIBOSS") 
            {
                const hidden4 = document.createElement("input");
                hidden4.type = "hidden";
                hidden4.id = "act4";
                hidden4.value = "-";
                container.appendChild(hidden4);
            }
        }

        async function login() 
        {
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            const reponse = await fetch("/login", 
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });

            const data = await reponse.json();

            if (reponse.ok) 
            {
                token = data.token;
                document.getElementById("section-login").style.display = "none";
                document.getElementById("section-admin").style.display = "block";
                afficherMessage("Connecte en tant qu'admin");
                chargerMonstres();
            } 
            else 
            {
                afficherMessage("Identifiants incorrects");
            }
        }

        function deconnexion() 
        {
            token = null;
            document.getElementById("section-login").style.display = "block";
            document.getElementById("section-admin").style.display = "none";
            chargerMonstres();
        }

        async function chargerMonstres() 
        {
            const reponse = await fetch("/monstres");
            const monstres = await reponse.json();
            const tbody = document.getElementById("liste-monstres");
            tbody.innerHTML = "";

            for (const m of monstres) 
            {
                const actions = [m.act1, m.act2, m.act3, m.act4]
                    .filter(a => a && a !== "-")
                    .join(", ");

                let boutonSupprimer = "";

                if (token) 
                {
                    boutonSupprimer = `<button onclick="supprimerMonstre('${m.nom}')">Supprimer</button>`;
                }

                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${m.nom}</td>
                    <td>${m.categorie}</td>
                    <td>${m.hp}</td>
                    <td>${m.atk}</td>
                    <td>${m.def}</td>
                    <td>${m.mercy}</td>
                    <td>${actions}</td>
                    <td>${boutonSupprimer}</td>
                `;
                tbody.appendChild(tr);
            }
        }

        async function supprimerMonstre(nom) 
        {
            const reponse = await fetch("/monstres/" + nom, 
            {
                method: "DELETE",
                headers: { "Authorization": "Bearer " + token }
            });

            const data = await reponse.json();
            afficherMessage(data.message || data.erreur);
            chargerMonstres();
        }

        async function ajouterMonstre() 
        {
            const categorie = document.getElementById("categorie").value;
            const nb = actionsParCategorie[categorie] || 0;

            const actionsChoisies = [];
            for (let i = 1; i <= nb; i++) 
            {
                actionsChoisies.push(document.getElementById("act" + i).value);
            }

            if (new Set(actionsChoisies).size !== actionsChoisies.length) 
            {
                afficherMessage("Les actions doivent etre toutes differentes");
                return;
            }

            let act1 = "-";
            let act2 = "-";
            let act3 = "-";
            let act4 = "-";

            if (document.getElementById("act1")) 
            {
                act1 = document.getElementById("act1").value;
            }
            if (document.getElementById("act2")) 
            {
                act2 = document.getElementById("act2").value;
            }
            if (document.getElementById("act3")) 
            {
                act3 = document.getElementById("act3").value;
            }
            if (document.getElementById("act4")) 
            {
                act4 = document.getElementById("act4").value;
            }

            const monstre = {
                categorie: categorie,
                nom: document.getElementById("nom").value,
                hp: document.getElementById("hp").value,
                atk: document.getElementById("atk").value,
                def: document.getElementById("def").value,
                mercy: document.getElementById("mercy").value,
                act1: act1,
                act2: act2,
                act3: act3,
                act4: act4
            };

            const reponse = await fetch("/monstres", 
            {
                method: "POST",
                headers: 
                {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify(monstre)
            });

            const data = await reponse.json();
            afficherMessage(data.message || data.erreur);
            chargerMonstres();
        }

        chargerMonstres();
    </script>

</body>
</html>
