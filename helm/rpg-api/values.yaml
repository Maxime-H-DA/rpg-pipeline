namespace: rpg-pipeline

image:
  repository: rpg-api
  tag: local
  pullPolicy: IfNotPresent

replicaCount: 2

containerPort: 5000
dbPath: /app/data/database.db

secret:
  name: rpg-api-secret

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

storage:
  size: 256Mi

podSecurity:
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

probes:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 20

service:
  port: 80
  targetPort: 5000

networkPolicy:
  enabled: true
