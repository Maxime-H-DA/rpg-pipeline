name: RPG

on:
  push:
    branches:
      - main

jobs:
  pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Installation de Cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Analyse du code C++
        run: cppcheck --enable=all --error-exitcode=1 rpg-source/