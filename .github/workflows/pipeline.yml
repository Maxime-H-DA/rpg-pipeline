name: RPG

on:
  push:
    branches:
      - main

jobs:
  analyse:
    runs-on: ubuntu-latest
    
    steps:
      - name: Téléchargement du code source
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Installation de Cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Recherche de bugs dans le code C++
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            rpg-source/

      - name: Construction de l'image Docker
        run: docker build -t rpg-alterdune .

      - name: Scan de vulnérabilités de l'image Docker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rpg-alterdune
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Détection de secrets dans le code
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}