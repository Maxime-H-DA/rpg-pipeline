name: RPG

on:
  push:
    branches:
      - main

jobs:
  analyse-code:
    runs-on: ubuntu-latest
    steps:
      - name: Téléchargement du code source
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Détection de secrets dans le code
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Installation de Cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Recherche de bugs dans le code C++
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            rpg-source/

  scan-jeu:
    runs-on: ubuntu-latest
    steps:
      - name: Téléchargement du code source
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Construction de l'image du jeu
        run: docker build -t rpg-alterdune .

      - name: Scan de vulnérabilités du jeu
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rpg-alterdune
          severity: HIGH,CRITICAL
          exit-code: 0

  scan-api:
    runs-on: ubuntu-latest
    steps:
      - name: Téléchargement du code source
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Construction de l'image de l'API
        run: docker build -t rpg-api -f rpg-api/Dockerfile .

      - name: Scan de vulnérabilités de l'API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rpg-api
          severity: HIGH,CRITICAL
          exit-code: 0

  sast-api:
    runs-on: ubuntu-latest
    steps:
      - name: Téléchargement du code source
        uses: actions/checkout@v4

      - name: Analyse Bandit (vulnérabilités Python)
        run: |
          pip install bandit
          bandit -r rpg-api/ -f json -o bandit-report.json || true

      - name: Analyse Semgrep (SAST moderne)
        run: |
          pip install semgrep
          semgrep scan --config auto rpg-api/ --json --output semgrep-report.json || true

      - name: Upload rapports SAST
        uses: actions/upload-artifact@v4
        with:
          name: sast-reports
          path: |
            bandit-report.json
            semgrep-report.json

  tests-api:
    runs-on: ubuntu-latest
    steps:
      - name: Téléchargement du code source
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Installation des dépendances
        run: pip install -r rpg-api/requirements.txt

      - name: Lancement des tests unitaires
        run: python -m pytest rpg-api/tests/test_app.py -v

  dast-api:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Réveil de l'API Render
        run: |
          curl --retry 5 --retry-delay 10 --retry-connrefused \
            https://rpg-pipeline.onrender.com
          sleep 15

      - name: OWASP ZAP sur l'API Render
        continue-on-error: true
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://rpg-pipeline.onrender.com'
          fail_action: false

  supply-chain-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Téléchargement du code source
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Calcul du nom d'image en minuscule
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/rpg-api" >> "$GITHUB_OUTPUT"

      - name: Connexion à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construction et publication de l'image API
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: rpg-api/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.sha }}

      - name: Installation de Syft
        uses: anchore/sbom-action/download-syft@v0.17.9

      - name: Génération du SBOM
        run: |
          syft ${{ steps.image.outputs.name }}:${{ github.sha }} \
            -o spdx-json=sbom-rpg-api.spdx.json \
            -o cyclonedx-json=sbom-rpg-api.cdx.json

      - name: Upload du SBOM en artefact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-rpg-api
          path: sbom-rpg-api.*.json

      - name: Installation de Cosign
        uses: sigstore/cosign-installer@v3

      - name: Signature keyless de l'image (Sigstore)
        run: |
          cosign sign --yes \
            ${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}

      - name: Attachement du SBOM à l'image (attestation)
        run: |
          cosign attest --yes \
            --predicate sbom-rpg-api.spdx.json \
            --type spdxjson \
            ${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}

      - name: Vérification de la signature
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            ${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}

  iac-scan-checkov:
    runs-on: ubuntu-latest
    steps:
      - name: Téléchargement du code source
        uses: actions/checkout@v4

      - name: Installation de Helm
        uses: azure/setup-helm@v4

      - name: Scan Checkov des manifests Kubernetes
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: k8s/
          framework: kubernetes
          output_format: cli
          soft_fail: true

      - name: Scan Checkov du chart Helm
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: helm/
          framework: helm
          output_format: cli
          soft_fail: true
